name: Release

on:
  push:
    branches:
      - 'release/*'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ============================================================================
  # RELEASE CANDIDATE BUILD - Triggered on release/* branches
  # ============================================================================

  rc-test:
    name: RC - Test & Validate
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: macos-26
    timeout-minutes: 20
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Cache Mint packages
        uses: actions/cache@v6
        with:
          path: ~/.mint
          key: ${{ runner.os }}-mint-${{ hashFiles('Mintfile') }}
          restore-keys: ${{ runner.os }}-mint-

      - name: Cache Homebrew downloads
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: ${{ runner.os }}-homebrew-

      - name: Install Mint
        run: brew install mint

      - name: Install SwiftLint and Periphery
        run: mint bootstrap

      - name: Lint
        run: mint run swiftlint lint --strict

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test --no-parallel

      - name: Periphery
        run: mint run periphery scan

      - name: Extract RC Version
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          VERSION=${BRANCH#release/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "RC Version: ${VERSION}"

  rc-test-linux:
    name: RC - Test (Linux)
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: rc-test
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test --no-parallel 2>&1

  rc-test-android:
    name: RC - Test (Android)
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: rc-test
    steps:
      - uses: actions/checkout@v7

      - name: Test Swift Package on Android
        uses: skiptools/swift-android-action@v2
        with:
          android-cores: 4
          free-disk-space: true

  rc-test-windows:
    name: RC - Test (Windows)
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: windows-latest
    timeout-minutes: 25
    needs: rc-test
    steps:
      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.3-release
          swift-build: 6.3-RELEASE

      - uses: actions/checkout@v7

      - name: Build
        run: swift build

      - name: Test
        run: swift test --no-parallel

  rc-notify-status:
    name: RC - Notify Status
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: macos-26
    needs: [rc-test, rc-test-linux, rc-test-android, rc-test-windows]
    steps:
      - name: Extract Version
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          VERSION=${BRANCH#release/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Success Notification
        if: success()
        run: |
          echo "::notice::Release Candidate ${{ steps.version.outputs.version }} is ready for promotion"
          echo ""
          echo "Next steps:"
          echo "1. Test integration in your projects (via Swift Package Manager)"
          echo "2. When ready to promote, create a release tag:"
          echo "   git tag v${{ steps.version.outputs.version }}"
          echo "   git push origin v${{ steps.version.outputs.version }}"
          echo ""
          echo "Or use the Promote RC to Release workflow."

      - name: Failure Notification
        if: failure()
        run: |
          echo "::error::Release Candidate build failed"
          echo ""
          echo "Review the failed jobs above and fix the issues."
          echo "Push fixes to: ${{ github.ref_name }}"

  # ============================================================================
  # RELEASE PROMOTION - Triggered on version tags (v*.*.*)
  # ============================================================================

  promote-test:
    name: Promote - Verify Tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Validate Tag Format
        run: |
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid tag format: $TAG"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi
          echo "::notice::Promoting tag: $TAG"

      - name: Verify Tag on Release Branch
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=${TAG#v}

          # Check if there's a corresponding release branch
          if git show-ref --verify --quiet "refs/remotes/origin/release/$VERSION"; then
            echo "::notice::Found corresponding release branch: release/$VERSION"
          else
            echo "::warning::No release branch found for release/$VERSION"
            echo "It's OK to proceed if the tag is on main branch"
          fi

  create-release:
    name: Promote - Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    timeout-minutes: 15
    needs: promote-test
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 ${TAG}^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            BODY="Initial release"
          else
            COMMITS=$(git log ${PREV_TAG}..${TAG} --oneline)
            BODY="## Changes

          ${COMMITS}

          ## Installation

          Add the package via Swift Package Manager:

          \`\`\`swift
          .package(url: \"https://github.com/${{ github.repository }}.git\", from: \"${TAG#v}\")
          \`\`\`"
          fi

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.body }}"
        env:
          GH_TOKEN: ${{ github.token }}

  notify-promotion-status:
    name: Promote - Notify Status
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    needs: [promote-test, create-release]
    steps:
      - name: Success Notification
        if: success()
        run: |
          echo "::notice::Release ${{ github.ref_name }} published successfully"
          echo ""
          echo "View release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

      - name: Failure Notification
        if: failure()
        run: |
          echo "::error::Release promotion failed for tag ${{ github.ref_name }}"
          echo ""
          echo "This tag has been pushed but the release was not created."
          echo "See workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "Recovery:"
          echo "1. Delete the tag: git tag -d ${{ github.ref_name }} && git push origin :refs/tags/${{ github.ref_name }}"
          echo "2. Fix issues locally"
          echo "3. Retry: git tag ${{ github.ref_name }} && git push origin ${{ github.ref_name }}"
