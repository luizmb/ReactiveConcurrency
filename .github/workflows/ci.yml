name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Cache Mint packages
        uses: actions/cache@v5
        with:
          path: ~/.mint
          key: ${{ runner.os }}-mint-${{ hashFiles('Mintfile') }}
          restore-keys: ${{ runner.os }}-mint-

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-homebrew-

      - name: Install Mint
        run: brew install mint

      - name: Install SwiftLint and Periphery
        run: mint bootstrap

      - name: Lint
        run: mint run swiftlint lint --strict

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test --no-parallel 2>&1

      - name: Periphery
        run: mint run periphery scan

  test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test --no-parallel 2>&1

  test-android:
    name: Build & Test (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Cross-compiles the package with the Swift Android SDK and runs the test suite on an
      # Android emulator (the action provisions and boots it). --no-parallel for the same reason
      # as Linux: Swift Testing's parallel execution starves async consumer Tasks on constrained
      # runners, and the emulator is more constrained still.
      - name: Test Swift Package on Android
        uses: skiptools/swift-android-action@v2
        with:
          swift-test-flags: --no-parallel
          free-disk-space: true
