name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Cache Mint packages
        uses: actions/cache@v6
        with:
          path: ~/.mint
          key: ${{ runner.os }}-mint-${{ hashFiles('Mintfile') }}
          restore-keys: ${{ runner.os }}-mint-

      - name: Cache Homebrew downloads
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-homebrew-

      - name: Install Mint
        run: brew install mint

      - name: Install SwiftLint and Periphery
        run: mint bootstrap

      - name: Lint
        run: mint run swiftlint lint --strict

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test 2>&1

      - name: Periphery
        run: mint run periphery scan

  test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test 2>&1

  test-android:
    name: Build & Test (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Cross-compiles the package with the Swift Android SDK and runs the test suite on an
      # Android emulator (the action provisions and boots it). The action runs the on-device
      # binary as both XCTest and swift-testing, and the XCTest pass rejects swift test's
      # --no-parallel, so serial execution can't be forced; android-cores gives the emulator
      # extra CPUs to reduce Swift Testing parallel-task starvation. Requires the Android-
      # compatible FP (>= 1.11.2, Float80 guard) which Package.swift now floors.
      - name: Test Swift Package on Android
        uses: skiptools/swift-android-action@v2
        with:
          android-cores: 4
          free-disk-space: true

  test-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      # Installs the Swift toolchain for Windows (uses the Visual Studio C++ tools preinstalled on
      # the runner). Toolchain setup must come before checkout/build.
      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.2-release
          swift-build: 6.2-RELEASE

      - uses: actions/checkout@v7

      - name: Build
        run: swift build

      - name: Test
        run: swift test
